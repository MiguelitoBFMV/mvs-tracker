{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}MAL Insight Lab{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'mal_data/css/app.css' %}">
</head>
<body>
    <div class="command-shell">
        <header class="topbar">
            <a class="brand" href="{% url 'dashboard' %}">
                <span class="brand-icon">⌁</span>
                <span class="brand-title">MAL INSIGHT LAB</span>
            </a>

            <nav class="main-nav" aria-label="Navegación principal">
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'anime_status_list' 'watching' %}">Watching</a>
                <a href="{% url 'anime_status_list' 'on_hold' %}">On Hold</a>
                <a href="{% url 'anime_status_list' 'plan_to_watch' %}">Plan to Watch</a>
                <a href="{% url 'anime_status_list' 'completed' %}">Completed</a>
                <a href="{% url 'anime_status_list' 'dropped' %}">Dropped</a>
                <a href="{% url 'anime_search' %}">Search</a>
                <a href="/admin/">Admin</a>
            </nav>

            <aside class="network-state" aria-label="Estado de conexión">
                <span>Network State</span><br>
                <strong>Encrypted</strong>
            </aside>
        </header>

        <main class="page">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
